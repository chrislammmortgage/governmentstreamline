// ═══════════════════════════════════════════
// CORE MATH
// ═══════════════════════════════════════════
const TIERS=[[250000,430,605],[500000,550,685],[750000,680,785],[1000000,760,925],[1500000,1045,1085],[2000000,1330,1085],[3000000,2035,1085],[4000000,2740,1085],[5000000,3620,1085],[6000000,4120,1085]];
function tLookup(a){for(const[m,p,e]of TIERS)if(a<=m)return{l:p,s:e,t:p+e,tier:"Up to $"+m.toLocaleString()};return{l:4120,s:1085,t:5205,tier:"Over $6M"};}
function mp(p,r,n){if(!r)return Math.round(p/n*100)/100;const m=r/12;return Math.round(p*(m*Math.pow(1+m,n))/(Math.pow(1+m,n)-1)*100)/100;}
function pd(b,r){return Math.round(b*r/365*100)/100;}
function fmt(n){if(n==null||isNaN(n))return"$0";return(n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString();}
function fmtC(n){if(n==null||isNaN(n))return"$0.00";return(n<0?"-":"")+"$"+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtP(r,d=3){return(r*100).toFixed(d)+"%";}

// Seasoning: FHA=210d from closing, VA=210d from 1st pmt due (PL 116-33)
function fhaSeason(oc,fp,tc){
  if(!oc||!fp||!tc)return null;
  const o=new Date(oc),f=new Date(fp),t=new Date(tc);
  const days=Math.floor((t-o)/864e5);
  const mos=(t.getFullYear()-f.getFullYear())*12+(t.getMonth()-f.getMonth());
  const d210=new Date(o);d210.setDate(d210.getDate()+210);
  const m6=new Date(f);m6.setMonth(m6.getMonth()+6);
  const earliest=d210>m6?d210:m6;
  return{days,daysPass:days>=210,mos,mosPass:mos>=6,pmts:Math.max(0,mos),pmtsPass:mos>=6,earliest:earliest.toISOString().split("T")[0],pass:days>=210&&mos>=6};
}
function vaSeason(fp,tc,pmts){
  if(!fp||!tc)return null;
  const f=new Date(fp),t=new Date(tc);
  const days=Math.floor((t-f)/864e5);
  const d210=new Date(f);d210.setDate(d210.getDate()+210);
  return{days,daysPass:days>=210,pmts,pmtsPass:pmts>=6,earliest:d210.toISOString().split("T")[0],pass:days>=210&&pmts>=6};
}
function estPayoff(bal,rate,stDate,tcDate){
  if(!stDate||!tcDate)return{payoff:bal,days:0,pd:0};
  const days=Math.max(0,Math.floor((new Date(tcDate)-new Date(stDate))/864e5))+20;
  const d=pd(bal,rate);
  return{payoff:Math.round((bal+d*days)*100)/100,days,pd:d};
}
function estEscrowRefund(bal,mo,stDate,tcDate){
  if(!bal||!stDate||!tcDate)return null;
  const mos=Math.max(0,Math.ceil((new Date(tcDate)-new Date(stDate))/(864e5*30)));
  return{bal,mos,deps:Math.round(mo*mos),refund:Math.round(bal+mo*mos)};
}
function calcSkipped(tcDate,totalPmt){
  if(!tcDate)return null;
  const tc=new Date(tcDate);
  const fp=new Date(tc.getFullYear(),tc.getMonth()+2,1);
  const last=new Date(tc.getFullYear(),tc.getMonth(),1);
  const cnt=(fp.getFullYear()-last.getFullYear())*12+(fp.getMonth()-last.getMonth())-1;
  const months=[];
  for(let i=1;i<=cnt;i++){const m=new Date(last);m.setMonth(m.getMonth()+i);months.push(m.toLocaleString("default",{month:"long",year:"numeric"}));}
  return{cnt:Math.max(0,cnt),months,saved:Math.round(totalPmt*Math.max(0,cnt)),firstNew:fp.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})};
}
// FHA UFMIP
const UFMIP_PTS=[[1,.80],[6,.70],[12,.58],[24,.34],[30,.22],[36,.10]];
function ufmipRefund(orig,caseDate,closeDate){
  const ms=(new Date(closeDate).getFullYear()-new Date(caseDate).getFullYear())*12+(new Date(closeDate).getMonth()-new Date(caseDate).getMonth());
  let p=0;if(ms<=0)p=.80;else if(ms>36)p=0;
  else{for(let i=0;i<UFMIP_PTS.length-1;i++){const[m1,p1]=UFMIP_PTS[i],[m2,p2]=UFMIP_PTS[i+1];if(ms>=m1&&ms<=m2){p=p1+(p2-p1)*(ms-m1)/(m2-m1);break;}}}
  p=Math.round(p*10000)/10000;return{ms,p,pDisp:(p*100).toFixed(1)+"%",amt:Math.round(orig*p*100)/100};
}
function newUfmip(base,ref=0){const g=Math.round(base*.0175),n=Math.round(g-ref);return{base,g,ref,n,total:Math.round(base+n)};}
function mipRate(term,ltv){if(term>180)return ltv>90?.0055:.005;return ltv>90?.004:.0015;}
function moMip(base,rate){return Math.round(base*rate/12);}
// VA
function va8923(bal,costs,discPct,ffRate){
  const l3=bal,l4=Math.round(l3*discPct/100*100)/100,l5=Math.round(l3*ffRate*100)/100;
  const l7=l4+l5,l9=l3+l7+costs;
  const l11=Math.round(l9*discPct/100*100)/100,l14=Math.round((l9+l11)*ffRate*100)/100;
  return{bal,costs,initFF:l5,prelim:l9,revFF:l14,maxLoan:Math.floor(l9+l11+l14-l7+costs)};
}
function calcPricing(obP,pe,loanAmt){
  const adj=Math.round((obP+pe)*1000)/1000,dp=adj-100;
  const dd=Math.round(loanAmt*dp/100*100)/100;
  return{obPrice:obP,priceException:pe,adjusted:adj,diffPct:dp,diffDollars:Math.abs(dd),isCredit:dd>0};
}
// Conv LTV/PMI
const MAX_LTV_RT={"primary_sfr":97,"primary_condo":97,"primary_2unit":85,"primary_3-4unit":80,"second_sfr":90,"second_condo":90,"investment_sfr":75,"investment_2unit":70,"investment_3-4unit":70};
function getMaxLTV(occ,prop){return MAX_LTV_RT[occ+"_"+prop]||null;}
function calcLTV(loan,value){return Math.round(loan/value*10000)/100;}
function estPMI(loan,value,score){
  const ltv=calcLTV(loan,value);if(ltv<=80)return{ltv,needed:false,monthly:0,rate:0};
  let r;
  if(score>=760)r=ltv<=85?.0019:ltv<=90?.0028:ltv<=95?.0038:.0055;
  else if(score>=740)r=ltv<=85?.0025:ltv<=90?.0035:ltv<=95?.0048:.0065;
  else if(score>=720)r=ltv<=85?.0033:ltv<=90?.0045:ltv<=95?.0058:.0078;
  else if(score>=700)r=ltv<=85?.0040:ltv<=90?.0055:ltv<=95?.0073:.0095;
  else if(score>=680)r=ltv<=85?.0050:ltv<=90?.0068:ltv<=95?.0090:.0115;
  else r=ltv<=85?.0065:ltv<=90?.0085:ltv<=95?.0110:.0145;
  return{ltv,needed:true,monthly:Math.round(loan*r/12),rate:r,rateDisp:(r*100).toFixed(2)+"%",score};
}

// ═══ RUNNERS ═══
function runFHA(i){
  const po=i.useSt?estPayoff(i.stBal||i.bal,i.rate,i.stDate,i.tcDate):{payoff:i.bal+pd(i.bal,i.rate)*i.dtc,days:i.dtc,pd:pd(i.bal,i.rate)};
  const payoff=Math.round(po.payoff*100)/100;
  const ref=ufmipRefund(i.origUfmip,i.caseDate,i.tcDate);
  const u=newUfmip(payoff,ref.amt);const tl=u.total,bl=u.base;
  const mr=mipRate(i.term,95),nm=moMip(bl,mr);const npd=pd(tl,i.nr);
  const mT=Math.round(i.tax/12*100)/100,mI=Math.round(i.ins/12*100)/100,esc=Math.round((mT+mI)*100)/100;
  const gI=Math.round(mI*i.eIM),gT=Math.round(mT*i.eTM),fT=Math.round(mT*i.pTM),fI=Math.round(mI*i.iPM);
  const tl2=tLookup(tl);const pricing=calcPricing(i.obP,i.pe,payoff);
  const sA={"Processing Fees":499,"Underwriting Fees":499};
  if(!pricing.isCredit&&pricing.diffDollars>0)sA["Discount Points ("+Math.abs(pricing.diffPct).toFixed(3)+"%)"]=Math.round(pricing.diffDollars);
  const tA=Object.values(sA).reduce((a,b)=>a+b,0);
  const sB={"Credit Report":277,"Flood Certification":5,"Tax Service":65,"UFMIP (Net Financed)":u.n},tB=Object.values(sB).reduce((a,b)=>a+b,0);
  const sC={"Title — Lender's Policy":tl2.l,"Title — Settlement/Escrow":tl2.s},tC=tl2.t;const tD=tA+tB+tC;
  const sE={"Recording Fees (incl CA SB2)":375},tE=375;
  const sF={};if(npd>0)sF["Prepaid Interest ("+fmtC(npd)+"/day x 1)"]=Math.round(npd);
  if(fT>0)sF["Prepaid Tax ("+fmtC(mT)+"/mo x "+i.pTM+")"]=fT;if(fI>0)sF["Prepaid Insurance ("+fmtC(mI)+"/mo x "+i.iPM+")"]=fI;
  const tF=Object.values(sF).reduce((a,b)=>a+b,0);
  const sG={};if(gI>0)sG["Insurance Reserve ("+fmtC(mI)+"/mo x "+i.eIM+")"]=gI;if(gT>0)sG["Tax Reserve ("+fmtC(mT)+"/mo x "+i.eTM+")"]=gT;
  const tG=Object.values(sG).reduce((a,b)=>a+b,0),tI2=tE+tF+tG;
  const lc=pricing.isCredit?Math.round(pricing.diffDollars):0;const tJ=tD+tI2-lc,fo=tD+tE-lc;
  const ctc=tl-tJ-payoff;const npi=mp(tl,i.nr,i.term);
  const newT=Math.round((npi+nm+esc)*100)/100,oldT=Math.round((i.pi+i.mip+esc)*100)/100;
  const sav=Math.round((oldT-newT)*100)/100;
  const omr=i.bal>0?(i.mip*12)/i.bal:0;const rr=(i.rate+omr)-(i.nr+mr),pr=(i.pi+i.mip)-(npi+nm);
  const seas=fhaSeason(i.ocDate,i.fpDate,i.tcDate);
  const eRef=estEscrowRefund(i.eBal,i.eMo||esc,i.stDate,i.tcDate);
  const skip=calcSkipped(i.tcDate,i.pi+i.mip+(i.eMo||esc));
  const be=sav>0?Math.round(Math.max(fo,0)/sav*10)/10:null;
  return{payoff,po,ref,u,tl,bl,mr,nm,npd,tl2,sA,tA,sB,tB,sC,tC,tD,sE,tE,sF,tF,sG,tG,tI2,tJ,fo,pricing,lc,ctc,npi,newT,oldT,sav,annual:Math.round(sav*12*100)/100,rr,pr,ntbPass:rr>=.005||pr>=50,seas,eRef,skip,be,mT,mI,esc,nr:i.nr,term:i.term};
}

function runVA(i){
  const po=i.useSt?estPayoff(i.stBal||i.bal,i.rate,i.stDate,i.tcDate):{payoff:i.bal+pd(i.bal,i.rate)*i.dtc,days:i.dtc,pd:pd(i.bal,i.rate)};
  const payoff=Math.round(po.payoff*100)/100;const ffR=i.disEx?0:.005;
  const mT=Math.round(i.tax/12*100)/100,mI=Math.round(i.ins/12*100)/100,esc=Math.round((mT+mI)*100)/100;
  const gI=Math.round(mI*i.eIM),gT=Math.round(mT*i.eTM),fT=Math.round(mT*i.pTM),fI=Math.round(mI*i.iPM);
  const tl2=tLookup(payoff);const pricing=calcPricing(i.obP,i.pe,payoff);
  const discPts=(!pricing.isCredit&&pricing.diffDollars>0)?Math.round(pricing.diffDollars):0;
  const costsExFF=998+discPts+277+5+65+tl2.t+375;
  const va=va8923(payoff,costsExFF,i.pts||0,ffR);const totalLoan=va.maxLoan;
  const ffAmt=Math.round(totalLoan*ffR*100)/100;const npd=pd(totalLoan,i.nr);
  const sA={"Processing Fees":499,"Underwriting Fees":499};
  if(discPts>0)sA["Discount Points ("+Math.abs(pricing.diffPct).toFixed(3)+"%)"]=discPts;
  const tA=Object.values(sA).reduce((a,b)=>a+b,0);
  const sB={"Credit Report":277,"Flood Certification":5,"Tax Service":65};if(ffAmt>0)sB["VA Funding Fee"]=ffAmt;
  const tB=Object.values(sB).reduce((a,b)=>a+b,0);
  const sC={"Title — Lender's Policy":tl2.l,"Title — Settlement/Escrow":tl2.s},tC=tl2.t;const tD=tA+tB+tC;
  const sE={"Recording Fees (incl CA SB2)":375},tE=375;
  const sF={};if(npd>0)sF["Prepaid Interest ("+fmtC(npd)+"/day x 1)"]=Math.round(npd);
  if(fT>0)sF["Prepaid Tax ("+fmtC(mT)+"/mo x "+i.pTM+")"]=fT;if(fI>0)sF["Prepaid Insurance ("+fmtC(mI)+"/mo x "+i.iPM+")"]=fI;
  const tF=Object.values(sF).reduce((a,b)=>a+b,0);
  const sG={};if(gI>0)sG["Insurance Reserve ("+fmtC(mI)+"/mo x "+i.eIM+")"]=gI;if(gT>0)sG["Tax Reserve ("+fmtC(mT)+"/mo x "+i.eTM+")"]=gT;
  const tG=Object.values(sG).reduce((a,b)=>a+b,0),tI2=tE+tF+tG;
  const lc=pricing.isCredit?Math.round(pricing.diffDollars):0;const tJ=tD+tI2-lc,refiC=costsExFF+ffAmt-lc;
  const ctc=totalLoan-tJ-payoff;const npi=mp(totalLoan,i.nr,i.term);
  const newT=Math.round((npi+esc)*100)/100,oldT=Math.round((i.pi+esc)*100)/100;
  const sav=Math.round((oldT-newT)*100)/100;const rr=i.rate-i.nr;
  const recM=sav>0?Math.round(Math.max(refiC,0)/sav*10)/10:null;
  const seas=vaSeason(i.fpDate,i.tcDate,i.pmts||0);
  const eRef=estEscrowRefund(i.eBal,i.eMo||esc,i.stDate,i.tcDate);
  const skip=calcSkipped(i.tcDate,i.pi+(i.eMo||esc));
  // VA compliance per MortgageOne checklist
  const piIncreasing=npi>i.pi;
  const ptiInc20=i.pi>0?((newT-oldT)/oldT*100)>20:false;
  return{payoff,po,va,totalLoan,ffR,ffAmt,disEx:i.disEx,tl2,sA,tA,sB,tB,sC,tC,tD,sE,tE,sF,tF,sG,tG,tI2,tJ,refiC,pricing,lc,ctc,npi,newT,oldT,sav,annual:Math.round(sav*12*100)/100,rr,ntbPass:rr>=.005,recM,recPass:recM!==null&&recM<=36,seas,eRef,skip,be:recM,mT,mI,esc,nr:i.nr,term:i.term,piIncreasing,ptiInc20};
}

function runConv(i){
  const po=i.useSt?estPayoff(i.stBal||i.bal,i.rate,i.stDate,i.tcDate):{payoff:i.bal+pd(i.bal,i.rate)*i.dtc,days:i.dtc,pd:pd(i.bal,i.rate)};
  const payoff=Math.round(po.payoff*100)/100;const maxLtv=getMaxLTV(i.occ,i.propType);
  const maxLoan=Math.round(i.propVal*(maxLtv/100)*100)/100;
  const mT=Math.round(i.tax/12*100)/100,mI=Math.round(i.ins/12*100)/100,mH=Math.round((i.hoa||0)/12*100)/100;
  const esc=Math.round((mT+mI+mH)*100)/100;
  const gI=Math.round(mI*i.eIM),gT=Math.round(mT*i.eTM),fT=Math.round(mT*i.pTM),fI=Math.round(mI*i.iPM);
  const options=(i.terms||[]).map(t=>{
    const tl2=tLookup(payoff);const pricing=calcPricing(t.obP,i.pe,payoff);
    const sA={"Processing Fees":499,"Underwriting Fees":499};
    if(!pricing.isCredit&&pricing.diffDollars>0)sA["Discount Points ("+Math.abs(pricing.diffPct).toFixed(3)+"%)"]=Math.round(pricing.diffDollars);
    const tA=Object.values(sA).reduce((a,b)=>a+b,0);
    const sB={"Credit Report":277,"Flood Certification":5,"Tax Service":65,"Appraisal":750},tB=Object.values(sB).reduce((a,b)=>a+b,0);
    const sC={"Title — Lender's Policy":tl2.l,"Title — Settlement/Escrow":tl2.s},tC=tl2.t;const tD=tA+tB+tC;
    const sE={"Recording Fees (incl CA SB2)":375},tE=375;const npd2=pd(payoff,t.rate);
    const sF={};if(npd2>0)sF["Prepaid Interest ("+fmtC(npd2)+"/day x 1)"]=Math.round(npd2);
    if(fT>0)sF["Prepaid Tax ("+fmtC(mT)+"/mo x "+i.pTM+")"]=fT;if(fI>0)sF["Prepaid Insurance ("+fmtC(mI)+"/mo x "+i.iPM+")"]=fI;
    const tF=Object.values(sF).reduce((a,b)=>a+b,0);
    const sG={};if(gI>0)sG["Insurance Reserve ("+fmtC(mI)+"/mo x "+i.eIM+")"]=gI;if(gT>0)sG["Tax Reserve ("+fmtC(mT)+"/mo x "+i.eTM+")"]=gT;
    const tG=Object.values(sG).reduce((a,b)=>a+b,0),tI2=tE+tF+tG;
    const lc=pricing.isCredit?Math.round(pricing.diffDollars):0;const tJ=tD+tI2-lc,fo=tD+tE-lc;

    const oldT=Math.round((i.pi+(i.curPmi||0)+esc)*100)/100;const sav=Math.round((oldT-newT)*100)/100;
    const ctc=useLoan-tJ-payoff;const be=sav>0?Math.round(Math.max(fo,0)/sav*10)/10:null;
    const intLife=Math.round((npi*t.term)-useLoan);
    return{label:(t.term/12)+"yr @ "+fmtP(t.rate),term:t.term,rate:t.rate,useLoan,ltv,ltvPass:ltv<=maxLtv,pmi,sA,tA,sB,tB,sC,tC,tD,sE,tE,sF,tF,sG,tG,tI2,tJ,fo,pricing,lc,ctc,npi,newT,oldT,sav,annual:Math.round(sav*12*100)/100,be,intLife};
  });
  const eRef=estEscrowRefund(i.eBal,i.eMo||esc,i.stDate,i.tcDate);
  const skip=calcSkipped(i.tcDate,i.pi+(i.curPmi||0)+(i.eMo||esc));
  return{payoff,po,maxLtv,maxLoan,propVal:i.propVal,score:i.score,options,eRef,skip,mT,mI,mH,esc,finCosts:i.finCosts};
}

// ═══ PDF ═══
function generatePDF(r,tab,borrower,property,lo){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();let y=20;const LM=15,RV=150;
  const hdr=(t)=>{doc.setFontSize(10);doc.setTextColor(15,23,42);doc.setFont(undefined,"bold");doc.text(t,LM,y);y+=2;doc.setDrawColor(203,213,225);doc.line(LM,y,195,y);y+=6;doc.setFont(undefined,"normal");};
  const row=(l,v,bold)=>{doc.setFontSize(8);doc.setTextColor(bold?15:71,bold?23:85,bold?42:105);doc.setFont(undefined,bold?"bold":"normal");doc.text(l,LM+2,y);doc.text(String(v),RV,y,{align:"right"});y+=5;};
  const np=()=>{if(y>265){doc.addPage();y=20;}};
  doc.setFillColor(255,255,255);doc.rect(0,0,210,297,"F");
  doc.setFillColor(15,23,42);doc.rect(0,0,210,16,"F");
  doc.setFontSize(11);doc.setTextColor(255,255,255);doc.text("TEAM LAMM — PROCESSING WORKSHEET",LM,11);
  doc.setFontSize(7);doc.text("MortgageOne Inc. NMLS #209221",145,11);y=25;
  const ltMap={fha:"FHA Streamline",va:"One Call / One Touch VA IRRRL",conv:"Conventional R/T"};
  hdr("LOAN INFORMATION");row("Borrower",borrower||"TBD");row("Property",property||"TBD");
  row("Loan Officer",lo||"Team Lamm");row("Loan Type",ltMap[tab]||tab);row("Date",new Date().toLocaleDateString());y+=3;
  hdr("PAYOFF (20-DAY BUFFER)");row("Estimated Payoff",fmt(r.payoff));row("Per Diem",fmtC(r.po?.pd||0)+"/day");row("Days",(r.po?.days||0));y+=3;

  const L=[];L.push("Subject: Your "+lt+" Refinance — "+(property||"Your Property"));L.push("");

  if(tab==="fha")L.push("• UFMIP refund of "+fmt(r.ref?.amt||0)+" already factored in.");

    </div>
    {tab==="fha"&&ocDate&&tcDate&&(()=>{const s=fhaSeason(ocDate,fpDate,tcDate);if(!s)return null;return<div style={{...S.card,marginTop:"10px",border:"2px solid "+(s.pass?"#16a34a":"#dc2626")}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"10px"}}><span style={S.badge(s.pass)}>{s.pass?"✓ Eligible":"✗ Not Yet"}</span>{!s.pass&&<span style={{fontSize:"13px",color:"#dc2626",fontWeight:600}}>Earliest: {s.earliest}</span>}</div>
      <div style={S.g(3)}><div><div style={{fontSize:"11px",color:"#64748b"}}>Days from Closing</div><div style={{fontSize:"16px",color:s.daysPass?"#16a34a":"#dc2626",fontWeight:700}}>{s.days} / 210</div></div>
      <div><div style={{fontSize:"11px",color:"#64748b"}}>Months from 1st Pmt</div><div style={{fontSize:"16px",color:s.mosPass?"#16a34a":"#dc2626",fontWeight:700}}>{s.mos} / 6</div></div>
      <div><div style={{fontSize:"11px",color:"#64748b"}}>Payments Made</div><div style={{fontSize:"16px",color:s.pmtsPass?"#16a34a":"#dc2626",fontWeight:700}}>{s.pmts} / 6</div></div></div>
    </div>;})()}
    {tab==="va"&&fpDate&&tcDate&&(()=>{const s=vaSeason(fpDate,tcDate,parseInt(vPmts)||0);if(!s)return null;return<div style={{...S.card,marginTop:"10px",border:"2px solid "+(s.pass?"#16a34a":"#dc2626")}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"10px"}}><span style={S.badge(s.pass)}>{s.pass?"✓ Eligible":"✗ Not Yet"}</span>{!s.pass&&<span style={{fontSize:"13px",color:"#dc2626",fontWeight:600}}>Earliest: {s.earliest}</span>}</div>
      <div style={S.g(2)}><div><div style={{fontSize:"11px",color:"#64748b"}}>Days from 1st Payment Due</div><div style={{fontSize:"16px",color:s.daysPass?"#16a34a":"#dc2626",fontWeight:700}}>{s.days} / 210</div></div>
      <div><div style={{fontSize:"11px",color:"#64748b"}}>Consecutive Payments</div><div style={{fontSize:"16px",color:s.pmtsPass?"#16a34a":"#dc2626",fontWeight:700}}>{s.pmts} / 6</div></div></div>
      <div style={{fontSize:"10px",color:"#64748b",marginTop:"6px"}}>PL 116-33: 210 days from first payment due date + 6 consecutive payments</div>
    </div>;})()}</div>

    {tab==="fha"&&<div style={S.card}><div style={S.ct}>FHA UFMIP</div><div style={S.g(2)}>
      <In label="Original UFMIP Amount" value={origU} onChange={setOrigU} placeholder="7300"/>
      <div style={{fontSize:"12px",color:"#64748b",paddingTop:"22px"}}>M1=80% · M6=70% · M12=58% · M24=34% · M30=22% · M36=10%</div>
    </div></div>}

    {tab!=="conv"?<div style={S.card}><div style={S.ct}>New Loan & Pricing</div><div style={S.g(4)}>
      <In label="New Rate (%)" value={nr} onChange={setNr} placeholder="5.750" step="0.125"/>
      <Sel2 label="Term" value={term} onChange={setTerm} options={[["360","30 Year"],["240","20 Year"],["180","15 Year"]]}/>
      <In label="OB Price" value={obP} onChange={setObP} placeholder="101.750"/>
      <In label="Price Exception (+/-)" value={pe} onChange={setPe} placeholder="0"/>
    </div><div style={S.info("#1e40af")}>Adjusted = OB + Exception. Above 100 = Credit to Borrower. Below 100 = Discount Points.</div>
    {tab==="va"&&<In label="Discount Points (%)" value={pts} onChange={setPts} placeholder="0"/>}</div>
    :<div style={S.card}><div style={S.ct}>Rate Options & Pricing</div>
      <In label="Price Exception (+/-)" value={pe} onChange={setPe} placeholder="0"/>
      <div style={{...S.g(3),marginTop:"12px"}}>
        <div style={{background:"#f0f9ff",border:"1px solid #bfdbfe",borderRadius:"6px",padding:"12px"}}><div style={{fontSize:"11px",color:"#1e40af",fontWeight:700,marginBottom:"8px"}}>30-YEAR</div><In label="Rate (%)" value={nr30} onChange={setNr30} placeholder="6.500"/><div style={{marginTop:"6px"}}><In label="OB Price" value={ob30} onChange={setOb30} placeholder="101.750"/></div></div>
        <div style={{background:"#f0f9ff",border:"1px solid #bfdbfe",borderRadius:"6px",padding:"12px"}}><div style={{fontSize:"11px",color:"#1e40af",fontWeight:700,marginBottom:"8px"}}>20-YEAR</div><In label="Rate (%)" value={nr20} onChange={setNr20} placeholder="6.250"/><div style={{marginTop:"6px"}}><In label="OB Price" value={ob20} onChange={setOb20} placeholder="102.000"/></div></div>
        <div style={{background:"#f0f9ff",border:"1px solid #bfdbfe",borderRadius:"6px",padding:"12px"}}><div style={{fontSize:"11px",color:"#1e40af",fontWeight:700,marginBottom:"8px"}}>15-YEAR</div><In label="Rate (%)" value={nr15} onChange={setNr15} placeholder="5.875"/><div style={{marginTop:"6px"}}><In label="OB Price" value={ob15} onChange={setOb15} placeholder="102.250"/></div></div>
      </div><div style={{marginTop:"10px"}}><Chk label="Finance closing costs into loan (up to max LTV)" checked={finCosts} onChange={setFinCosts}/></div>
    </div>}

    <div style={S.card}><div style={S.ct}>{"Taxes & Insurance — "+(county||"TBD")}</div><div style={S.g(4)}>
      <In label="Annual Property Taxes" value={tax} onChange={setTax} placeholder="4854"/>
      <In label="Annual Insurance" value={ins} onChange={setIns} placeholder="2237"/>
      <Sel2 label="Last Tax Installment" value={lastTax} onChange={setLastTax} options={[["second","2nd (Feb — Jan-Jun)"],["first","1st (Nov — Jul-Dec)"],["none","Unknown"]]}/>
      <In label="Insurance Prepaid (mo)" value={iPM} onChange={setIPM} placeholder="6"/>
    </div><div style={{...S.g(3),marginTop:"10px"}}>
      <In label="Insurance Reserve (mo)" value={eIM} onChange={setEIM} placeholder="2"/>
      <In label="Tax Reserve (mo)" value={eTM} onChange={setETM} placeholder="8"/>
      <In label="Prepaid Tax (mo)" value={pTM} onChange={setPTM} placeholder="2"/>
    </div></div>

    <div style={{textAlign:"center",marginBottom:"24px"}}><button style={S.btn} onClick={calc}>Calculate</button></div>

    {/* ═══ RESULTS ═══ */}
    {r&&<div>
      <div style={{display:"flex",gap:"10px",marginBottom:"16px",flexWrap:"wrap"}}>
        <button style={S.btn2("#1e40af")} onClick={()=>generatePDF(r,tab,borrower,property,lo)}>📄 Processing PDF</button>
        <button style={S.btn2("#0891b2")} onClick={genEmail}>✉️ Client Email</button>
      </div>

      {tab!=="conv"&&<div style={S.g(6)}>
        <Met v={fmt(r.payoff)} l="Payoff" c="#7c3aed"/>
        <Met v={fmt(tab==="fha"?r.tl:r.totalLoan)} l="Total Loan" c="#1e40af"/>
        <Met v={fmtP(r.nr)} l="Rate"/>
        <Met v={fmt(r.npi)} l="P&I"/>
        <Met v={fmt(r.sav)} l="Mo. Savings" c={r.sav>0?"#16a34a":"#dc2626"}/>
        <Met v={r.be?r.be+"mo":"N/A"} l="Break-Even" c="#f59e0b"/>
      </div>}
      {tab==="conv"&&<div style={S.g(4)}>
        <Met v={fmt(r.payoff)} l="Payoff" c="#7c3aed"/><Met v={fmt(r.propVal)} l="Value" c="#1e40af"/>
        <Met v={r.maxLtv+"%"} l="Max LTV" c="#f59e0b"/><Met v={fmt(r.maxLoan)} l="Max Loan"/>
      </div>}

      {/* Payoff */}
      <div style={{...S.card,marginTop:"16px"}}><div style={S.ct}>Payoff (20-Day Buffer)</div>
        <div style={S.sr}><span style={S.sl}>Statement Balance</span><span>{fmt(parseFloat(stBal||bal))}</span></div>
        <div style={S.sr}><span style={S.sl}>Per Diem</span><span>{fmtC(r.po?.pd||0)}/day</span></div>
        <div style={S.sr}><span style={S.sl}>Days (+ 20-day buffer)</span><span>{r.po?.days||0}</span></div>
        <div style={S.div}/><div style={{...S.sr,borderBottom:"none"}}><span style={{fontWeight:700}}>Estimated Payoff</span><span style={{color:"#7c3aed",fontWeight:700,fontSize:"16px"}}>{fmt(r.payoff)}</span></div>
      </div>

      {tab==="fha"&&r.u&&<div style={S.card}><div style={S.ct}>UFMIP</div>
        <div style={S.sr}><span style={S.sl}>Months since case</span><span>{r.ref.ms}</span></div>
        <div style={S.sr}><span style={S.sl}>Refund</span><span style={{color:"#16a34a",fontWeight:600}}>{r.ref.pDisp} = {fmt(r.ref.amt)}</span></div>
        <div style={S.div}/>
        <div style={S.sr}><span style={S.sl}>Gross UFMIP (1.75%)</span><span>{fmt(r.u.g)}</span></div>
        <div style={S.sr}><span style={S.sl}>Net Financed</span><span>{fmt(r.u.n)}</span></div>
        <div style={{...S.sr,borderBottom:"none"}}><span style={{fontWeight:700,color:"#1e40af"}}>Total Loan</span><span style={{fontWeight:700,color:"#1e40af"}}>{fmt(r.tl)}</span></div>
      </div>}

      {tab==="va"&&r.va&&<div style={S.card}><div style={S.ct}>VA Form 26-8923</div>
        <div style={S.sr}><span style={S.sl}>Payoff</span><span>{fmt(r.va.bal)}</span></div>
        <div style={S.sr}><span style={S.sl}>Costs (excl FF)</span><span>{fmt(r.va.costs)}</span></div>
        <div style={S.sr}><span style={S.sl}>Preliminary</span><span>{fmt(r.va.prelim)}</span></div>
        <div style={S.div}/>
        <div style={S.sr}><span style={S.sl}>Revised FF</span><span>{fmt(r.va.revFF)}</span></div>
        <div style={{...S.sr,borderBottom:"none"}}><span style={{fontWeight:700,color:"#1e40af"}}>Max Loan (#18)</span><span style={{fontWeight:700,color:"#1e40af",fontSize:"16px"}}>{fmt(r.totalLoan)}</span></div>
        <div style={S.sr}><span style={S.sl}>Funding Fee ({r.disEx?"EXEMPT":"0.50%"})</span><span style={{color:r.disEx?"#16a34a":"#1e293b",fontWeight:600}}>{fmt(r.ffAmt)}</span></div>
      </div>}

      {/* FHA/VA LE */}
      {tab!=="conv"&&<>
        <div style={S.card}><div style={S.ct}>Closing Costs — LE A–J</div>
          <Sec title="A. Origination" items={r.sA} total={r.tA}/>
          <Sec title="B. Cannot Shop For" items={r.sB} total={r.tB}/>
          <Sec title="C. Can Shop For" items={r.sC} total={r.tC}/>
          <div style={{...S.sr,background:"#eff6ff",padding:"8px",borderRadius:"4px",margin:"6px 0",borderBottom:"none"}}><span style={{color:"#1e40af",fontWeight:700}}>D. Total Loan Costs</span><span style={{color:"#1e40af",fontWeight:700}}>{fmt(r.tD)}</span></div>
          <Sec title="E. Government Fees" items={r.sE} total={r.tE}/>
          {Object.keys(r.sF).length>0&&<Sec title="F. Prepaids" items={r.sF} total={r.tF}/>}
          {Object.keys(r.sG).length>0&&<Sec title="G. Escrow Reserves" items={r.sG} total={r.tG}/>}
          <div style={{...S.sr,background:"#f8fafc",padding:"6px",margin:"4px 0",borderBottom:"none"}}><span style={{color:"#64748b",fontWeight:600}}>I. Total Other Costs</span><span style={{fontWeight:600}}>{fmt(r.tI2)}</span></div>
          {r.lc>0&&<div style={{...S.sr,padding:"4px",borderBottom:"none"}}><span style={{color:"#16a34a",fontWeight:600}}>Credit to Borrower</span><span style={{color:"#16a34a",fontWeight:600}}>−{fmt(r.lc)}</span></div>}
          <div style={{...S.sr,background:"#1e40af",color:"#fff",padding:"10px 8px",borderRadius:"4px",margin:"6px 0",borderBottom:"none"}}><span style={{fontWeight:700}}>J. Total Closing Costs</span><span style={{fontWeight:700}}>{fmt(r.tJ)}</span></div>
        </div>

        <div style={S.card}><div style={S.ct}>Pricing</div>
          <div style={S.sr}><span style={S.sl}>OB Price</span><span>{r.pricing.obPrice.toFixed(3)}</span></div>
          <div style={S.sr}><span style={S.sl}>Price Exception</span><span style={{color:r.pricing.priceException>=0?"#16a34a":"#dc2626"}}>{r.pricing.priceException>=0?"+":""}{r.pricing.priceException.toFixed(3)}</span></div>
          <div style={S.sr}><span style={S.sl}>Adjusted</span><span>{r.pricing.adjusted.toFixed(3)}</span></div>
          <div style={S.div}/>
          <div style={{...S.sr,borderBottom:"none"}}><span style={{color:r.pricing.isCredit?"#16a34a":"#dc2626",fontWeight:700}}>{r.pricing.isCredit?"Credit to Borrower":"Discount Points"}</span><span style={{color:r.pricing.isCredit?"#16a34a":"#dc2626",fontWeight:700,fontSize:"16px"}}>{fmt(r.pricing.diffDollars)}</span></div>
        </div>

        <div style={S.card}><div style={S.ct}>Cash to Close</div>
          <div style={S.sr}><span style={S.sl}>Loan Amount</span><span>{fmt(tab==="fha"?r.tl:r.totalLoan)}</span></div>
          <div style={S.sr}><span style={S.sl}>− Closing Costs</span><span style={{color:"#dc2626"}}>{fmt(-r.tJ)}</span></div>
          <div style={S.sr}><span style={S.sl}>− Payoff</span><span style={{color:"#dc2626"}}>{fmt(-r.payoff)}</span></div>
          <div style={S.div}/>
          <div style={{...S.sr,borderBottom:"none"}}><span style={{fontWeight:700}}>Cash to Close ({r.ctc<=0?"From":"To"} Borrower)</span><span style={{color:r.ctc>0?"#16a34a":"#7c3aed",fontWeight:700,fontSize:"18px"}}>{fmt(Math.abs(r.ctc))}</span></div>
        </div>

        <div style={S.card}><div style={S.ct}>Payment Comparison</div><div style={S.g(2)}>
          <div><div style={{fontSize:"12px",color:"#64748b",fontWeight:600,marginBottom:"6px"}}>CURRENT</div>
            <div style={S.sr}><span style={S.sl}>P&I</span><span>{fmt(parseFloat(pi))}</span></div>
            {tab==="fha"&&<div style={S.sr}><span style={S.sl}>MIP</span><span>{fmt(parseFloat(mip))}</span></div>}
            <div style={S.sr}><span style={S.sl}>Escrow</span><span>{fmt(r.esc)}</span></div>
            <div style={{...S.sr,borderTop:"2px solid #e2e8f0",borderBottom:"none",paddingTop:"6px"}}><span style={{fontWeight:700}}>Total</span><span style={{fontWeight:700}}>{fmt(r.oldT)}</span></div>
          </div>
          <div><div style={{fontSize:"12px",color:"#16a34a",fontWeight:600,marginBottom:"6px"}}>NEW</div>
            <div style={S.sr}><span style={S.sl}>P&I</span><span style={{color:"#16a34a"}}>{fmt(r.npi)}</span></div>
            {tab==="fha"&&<div style={S.sr}><span style={S.sl}>MIP</span><span style={{color:"#16a34a"}}>{fmt(r.nm||0)}</span></div>}
            <div style={S.sr}><span style={S.sl}>Escrow</span><span style={{color:"#16a34a"}}>{fmt(r.esc)}</span></div>
            <div style={{...S.sr,borderTop:"2px solid #e2e8f0",borderBottom:"none",paddingTop:"6px"}}><span style={{fontWeight:700,color:"#16a34a"}}>Total</span><span style={{fontWeight:700,color:"#16a34a"}}>{fmt(r.newT)}</span></div>
          </div>
        </div><div style={{...S.m("#16a34a"),marginTop:"12px"}}><div style={S.mv("#16a34a")}>{fmt(r.sav)}/mo · {fmt(r.annual)}/yr</div><div style={S.ml}>Savings</div></div></div>

        <div style={S.card}><div style={S.ct}>Compliance</div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
            <span style={S.badge(r.ntbPass)}>{r.ntbPass?"✓ NTB Pass":"✗ NTB Fail"}</span>
            <span style={{fontSize:"13px",color:"#475569"}}>{tab==="fha"?"Rate: "+fmtP(r.rr)+" · Payment: "+fmt(r.pr):"Rate: "+fmtP(r.rr)+" (≥0.500%)"}</span>
          </div>
          {r.seas&&<div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
            <span style={S.badge(r.seas.pass)}>{r.seas.pass?"✓ Seasoning":"✗ Seasoning"}</span>
            <span style={{fontSize:"13px",color:"#475569"}}>{r.seas.pass?"Eligible — "+r.seas.days+"d":"Earliest: "+r.seas.earliest}</span>
          </div>}
          {tab==="va"&&<><div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
            <span style={S.badge(r.recPass)}>{r.recPass?"✓ Recoupment":"✗ Recoupment"}</span>
            <span style={{fontSize:"13px",color:"#475569"}}>{r.recM?r.recM+" mo (max 36)":"No savings"}</span>
          </div>
          {r.piIncreasing&&<div style={S.info("#dc2626")}>⚠ P&I is INCREASING — Per MortgageOne guidelines, borrower cannot pay any closing costs. All costs must be offset by lender credits.</div>}
          {r.ptiInc20&&<div style={S.info("#dc2626")}>⚠ PITI increase exceeds 20% — This becomes a CREDIT QUALIFYING IRRRL. Income verification and Veteran Statement/Lender Certification required.</div>}</>}
        </div>
      </>}

      {/* Conv options */}
      {tab==="conv"&&r.options&&r.options.map((o,idx)=><div key={idx} style={{...S.card,border:"2px solid #bfdbfe"}}>
        <div style={{...S.ct,color:"#1e40af"}}>{"Option "+(idx+1)+": "+o.label}</div>
        <div style={S.g(6)}><Met v={fmt(o.useLoan)} l="Loan" c="#1e40af"/><Met v={o.ltv.toFixed(1)+"%"} l="LTV" c={o.ltvPass?"#16a34a":"#dc2626"}/><Met v={o.pmi.needed?fmt(o.pmi.monthly):"None"} l="PMI" c={o.pmi.needed?"#f59e0b":"#16a34a"}/><Met v={fmt(o.npi)} l="P&I"/><Met v={fmt(o.sav)} l="Savings" c={o.sav>0?"#16a34a":"#dc2626"}/><Met v={o.be?o.be+"mo":"N/A"} l="Break-Even" c="#f59e0b"/></div>
        {!o.ltvPass&&<div style={{...S.info("#dc2626"),marginTop:"10px"}}>LTV {o.ltv.toFixed(1)}% exceeds max {r.maxLtv}%</div>}
        <div style={{marginTop:"12px"}}><Sec title="A. Origination" items={o.sA} total={o.tA}/><Sec title="B. Cannot Shop" items={o.sB} total={o.tB}/><Sec title="C. Can Shop" items={o.sC} total={o.tC}/>
        <div style={{...S.sr,background:"#1e40af",color:"#fff",padding:"8px",borderRadius:"4px",margin:"6px 0",borderBottom:"none"}}><span style={{fontWeight:700}}>J. Total Closing Costs</span><span style={{fontWeight:700}}>{fmt(o.tJ)}</span></div></div>
        <div style={{marginTop:"10px",...S.sr,borderBottom:"none"}}><span style={{fontWeight:700}}>Cash to Close</span><span style={{color:o.ctc>0?"#16a34a":"#7c3aed",fontWeight:700,fontSize:"16px"}}>{fmt(Math.abs(o.ctc))}</span></div>
      </div>)}

      {/* Cash back */}
      {(r.skip?.cnt>0||r.eRef)&&<div style={S.card}><div style={S.ct}>💰 Cash Back to Borrower</div>
        {r.skip?.cnt>0&&<div style={{marginBottom:"10px"}}><div style={S.sr}><span style={S.sl}>Skipped: {r.skip.months.join(", ")}</span><span style={{color:"#16a34a",fontWeight:600}}>{fmt(r.skip.saved)}</span></div><div style={{fontSize:"11px",color:"#64748b"}}>First new payment: {r.skip.firstNew}</div></div>}
        {r.eRef&&<div style={S.sr}><span style={S.sl}>Escrow Refund (20-30 days)</span><span style={{color:"#16a34a",fontWeight:600}}>{fmt(r.eRef.refund)}</span></div>}
        <div style={S.div}/><div style={{...S.sr,borderBottom:"none"}}><span style={{color:"#16a34a",fontWeight:700}}>Total Cash Back</span><span style={{color:"#16a34a",fontWeight:700,fontSize:"18px"}}>{fmt((r.skip?.saved||0)+(r.eRef?.refund||0))}</span></div>
      </div>}

      {/* Email */}
      {showEmail&&<div style={S.card}><div style={S.ct}>Client Email</div>
        <div style={{display:"flex",gap:"10px",marginBottom:"12px"}}>
          <button style={S.btn2("#16a34a")} onClick={copyEmail}>{copied?"✓ Copied":"Copy"}</button>
          <button style={S.btn2("#0891b2")} onClick={()=>window.open("mailto:?subject="+encodeURIComponent(email.split("\n")[0].replace("Subject: ",""))+"&body="+encodeURIComponent(email.split("\n").slice(2).join("\n")))}>Open in Mail</button>
        </div>
        <textarea value={email} onChange={e=>setEmail(e.target.value)} style={{width:"100%",height:"350px",background:"#f8fafc",border:"1px solid #cbd5e1",borderRadius:"6px",color:"#1e293b",fontSize:"13px",fontFamily:"inherit",padding:"14px",resize:"vertical"}}/>
      </div>}

      {/* ═══ VA IRRRL SUBMISSION CHECKLIST ═══ */}
      {tab==="va"&&<div style={{marginTop:"24px"}}>
        <div style={{fontSize:"16px",fontWeight:700,color:"#0f172a",marginBottom:"16px",letterSpacing:".5px"}}>📋 ONE CALL / ONE TOUCH — VA IRRRL SUBMISSION CHECKLIST</div>
        {VA_CHECKLIST.map((sec,i)=><div key={i} style={S.check}>
          <div style={S.checkH}><span style={{background:"#1e40af",color:"#fff",borderRadius:"50%",width:"22px",height:"22px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:700}}>{i+1}</span>{sec.cat}</div>
          {sec.items.map((item,j)=><div key={j} style={S.checkI}>
            <span style={{position:"absolute",left:"4px",top:"5px",width:"12px",height:"12px",border:"2px solid #94a3b8",borderRadius:"2px",display:"inline-block"}}></span>
            {item}
          </div>)}
        </div>)}
      </div>}

      {/* Fee schedule */}
      <div style={{...S.card,opacity:.7,marginTop:"20px"}}><div style={{fontSize:"11px",color:"#64748b",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}}>
        <span>Processing: $499</span><span>Underwriting: $499</span><span>Credit: $277</span>
        <span>Flood: $5</span><span>Tax Svc: $65</span><span>Recording: $375</span>
        <span>Appraisal: $750 (Conv)</span><span>Title: Dynamic</span><span>Funding Fee: 0.50%</span>
      </div></div>
      <div style={{textAlign:"center",fontSize:"11px",color:"#94a3b8",padding:"20px 0"}}>Subject to final underwriting approval. Rates and fees subject to change.<br/>Team Lamm · MortgageOne Inc. NMLS #209221</div>
    </div>}
  </div>;
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script></body></html>
