  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'JetBrains Mono','SF Mono',monospace;background:#0a0e17;color:#c8cdd5;min-height:100vh}
  input,select,button,textarea{font-family:inherit}
  ::selection{background:#50fa7b33}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback} = React;
const BRANCH_FEES={processing:499,underwriting:499,credit_report:277,flood_cert:5,tax_service:65,recording:375,appraisal:750};
const TIERS=[[250000,430,605],[500000,550,685],[750000,680,785],[1000000,760,925],[1500000,1045,1085],[2000000,1330,1085],[3000000,2035,1085],[4000000,2740,1085],[5000000,3620,1085],[6000000,4120,1085]];
function tLookup(a){for(const[m,p,e]of TIERS)if(a<=m)return{l:p,s:e,t:p+e,tier:"Up to $"+m.toLocaleString()};return{l:4120,s:1085,t:5205,tier:"Over $6M"};}
function mp(p,r,n){if(!r)return Math.round(p/n*100)/100;const m=r/12;return Math.round(p*(m*Math.pow(1+m,n))/(Math.pow(1+m,n)-1)*100)/100;}
function pd(b,r){return Math.round(b*r/365*100)/100;}
function fmt(n){if(n==null||isNaN(n))return"$0";return(n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString();}
function fmtC(n){if(n==null||isNaN(n))return"$0.00";return(n<0?"-":"")+"$"+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtP(r,d=3){return(r*100).toFixed(d)+"%";}

// FHA Seasoning: 210 days from CLOSING DATE + 6 payments
function fhaSeason(oc,fp,tc){
  if(!oc||!fp||!tc)return null;
  const o=new Date(oc),f=new Date(fp),t=new Date(tc);
  const days=Math.floor((t-o)/864e5);
  const mos=(t.getFullYear()-f.getFullYear())*12+(t.getMonth()-f.getMonth());
  const d210=new Date(o);d210.setDate(d210.getDate()+210);
  const m6=new Date(f);m6.setMonth(m6.getMonth()+6);
  const earliest=d210>m6?d210:m6;
  return{days,daysPass:days>=210,mos,mosPass:mos>=6,pmts:Math.max(0,mos),pmtsPass:mos>=6,earliest:earliest.toISOString().split("T")[0],pass:days>=210&&mos>=6};
}
// VA IRRRL Seasoning: 210 days from FIRST PAYMENT DUE DATE + 6 consecutive payments (PL 116-33)
function vaSeason(fp,tc,pmts){
  if(!fp||!tc)return null;
  const f=new Date(fp),t=new Date(tc);
  const days=Math.floor((t-f)/864e5);
  const d210=new Date(f);d210.setDate(d210.getDate()+210);
  return{days,daysPass:days>=210,pmts,pmtsPass:pmts>=6,earliest:d210.toISOString().split("T")[0],pass:days>=210&&pmts>=6};
}
// Payoff: 20-day buffer past target closing
function estPayoff(bal,rate,stDate,tcDate){
  if(!stDate||!tcDate)return{payoff:bal,days:0,pd:0};
  const days=Math.max(0,Math.floor((new Date(tcDate)-new Date(stDate))/864e5))+20;
  const d=pd(bal,rate);
  return{payoff:Math.round((bal+d*days)*100)/100,days,pd:d};
}
function estEscrowRefund(bal,mo,stDate,tcDate){
  if(!bal||!stDate||!tcDate)return null;
  const mos=Math.max(0,Math.ceil((new Date(tcDate)-new Date(stDate))/(864e5*30)));
  return{bal,mos,deps:Math.round(mo*mos),refund:Math.round(bal+mo*mos)};
}
function calcSkipped(tcDate,totalPmt){
  if(!tcDate)return null;
  const tc=new Date(tcDate);
  const fp=new Date(tc.getFullYear(),tc.getMonth()+2,1);
  const last=new Date(tc.getFullYear(),tc.getMonth(),1);
  const cnt=(fp.getFullYear()-last.getFullYear())*12+(fp.getMonth()-last.getMonth())-1;
  const months=[];
  for(let i=1;i<=cnt;i++){const m=new Date(last);m.setMonth(m.getMonth()+i);months.push(m.toLocaleString("default",{month:"long",year:"numeric"}));}
  return{cnt:Math.max(0,cnt),months,saved:Math.round(totalPmt*Math.max(0,cnt)),firstNew:fp.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})};
}
// UFMIP Refund — linear interpolation between FHA data points
// M1=80%, M6=70%, M12=58%, M24=34%, M30=22%, M36=10%, >36=0%
const UFMIP_PTS=[[1,.80],[6,.70],[12,.58],[24,.34],[30,.22],[36,.10]];
function ufmipRefund(orig,caseDate,closeDate){
  const ms=(new Date(closeDate).getFullYear()-new Date(caseDate).getFullYear())*12+(new Date(closeDate).getMonth()-new Date(caseDate).getMonth());
  let p=0;
  if(ms<=0)p=.80;
  else if(ms>36)p=0;
  else{for(let i=0;i<UFMIP_PTS.length-1;i++){const[m1,p1]=UFMIP_PTS[i],[m2,p2]=UFMIP_PTS[i+1];if(ms>=m1&&ms<=m2){p=p1+(p2-p1)*(ms-m1)/(m2-m1);break;}}}
  p=Math.round(p*10000)/10000;
  return{ms,p,pDisp:(p*100).toFixed(1)+"%",amt:Math.round(orig*p*100)/100};
}
function newUfmip(base,ref=0){const g=Math.round(base*.0175),n=Math.round(g-ref);return{base,g,ref,n,total:Math.round(base+n)};}
function mipRate(term,ltv){if(term>180)return ltv>90?.0055:.005;return ltv>90?.004:.0015;}
function moMip(base,rate){return Math.round(base*rate/12);}
function va8923(bal,costs,discPct,ffRate){
  const l3=bal,l4=Math.round(l3*discPct/100*100)/100,l5=Math.round(l3*ffRate*100)/100;
  const l7=l4+l5,l9=l3+l7+costs;
  const l11=Math.round(l9*discPct/100*100)/100,l14=Math.round((l9+l11)*ffRate*100)/100;
  return{bal,costs,initFF:l5,prelim:l9,revFF:l14,maxLoan:Math.floor(l9+l11+l14-l7+costs)};
}
// Pricing: OB Price + Price Exception = Adjusted. >100=credit, <100=points
function calcPricing(obP,pe,loanAmt){
  const adj=Math.round((obP+pe)*1000)/1000,dp=adj-100;
  const dd=Math.round(loanAmt*dp/100*100)/100;
  return{obPrice:obP,priceException:pe,adjusted:adj,diffPct:dp,diffDollars:Math.abs(dd),isCredit:dd>0};
}

function runFHA(i){
  const po=i.useSt?estPayoff(i.stBal||i.bal,i.rate,i.stDate,i.tcDate):{payoff:i.bal+pd(i.bal,i.rate)*i.dtc,days:i.dtc,pd:pd(i.bal,i.rate)};
  const payoff=Math.round(po.payoff*100)/100;
  const ref=ufmipRefund(i.origUfmip,i.caseDate,i.tcDate);
  const u=newUfmip(payoff,ref.amt);
  const tl=u.total,bl=u.base;
  const mr=mipRate(i.term,95),nm=moMip(bl,mr);
  const npd=pd(tl,i.nr);
  const mT=Math.round(i.tax/12*100)/100,mI=Math.round(i.ins/12*100)/100,esc=Math.round((mT+mI)*100)/100;
  const gI=Math.round(mI*i.eIM),gT=Math.round(mT*i.eTM);
  const fT=Math.round(mT*i.pTM),fI=Math.round(mI*i.iPM);
  const tl2=tLookup(tl);
  const pricing=calcPricing(i.obP,i.pe,payoff);
  const sA={"Processing Fees":499,"Underwriting Fees":499};
  if(!pricing.isCredit&&pricing.diffDollars>0)sA["Discount Points ("+Math.abs(pricing.diffPct).toFixed(3)+"%)"]=Math.round(pricing.diffDollars);
  const tA=Object.values(sA).reduce((a,b)=>a+b,0);
  const sB={"Credit Report":277,"Flood Certification":5,"Tax Service":65,"UFMIP (Net Financed)":u.n},tB=Object.values(sB).reduce((a,b)=>a+b,0);
  const sC={"Title — Lender's Policy":tl2.l,"Title — Settlement/Escrow":tl2.s},tC=tl2.t;
  const tD=tA+tB+tC;
  const sE={"Recording Fees (incl CA SB2)":375},tE=375;
  const sF={};if(npd>0)sF["Prepaid Interest ("+fmtC(npd)+"/day x 1 day)"]=Math.round(npd);
  if(fT>0)sF["Prepaid Property Tax ("+fmtC(mT)+"/mo x "+i.pTM+" mo)"]=fT;
  if(fI>0)sF["Prepaid Insurance ("+fmtC(mI)+"/mo x "+i.iPM+" mo)"]=fI;
  const tF=Object.values(sF).reduce((a,b)=>a+b,0);
  const sG={};if(gI>0)sG["Insurance Reserve ("+fmtC(mI)+"/mo x "+i.eIM+" mo)"]=gI;
  if(gT>0)sG["Tax Reserve ("+fmtC(mT)+"/mo x "+i.eTM+" mo)"]=gT;
  const tG=Object.values(sG).reduce((a,b)=>a+b,0),tI2=tE+tF+tG;
  const lc=pricing.isCredit?Math.round(pricing.diffDollars):0;
  const tJ=tD+tI2-lc,fo=tD+tE-lc;
  const ctc=tl-tJ-payoff;
  const npi=mp(tl,i.nr,i.term);
  const newT=Math.round((npi+nm+esc)*100)/100,oldT=Math.round((i.pi+i.mip+esc)*100)/100;
  const sav=Math.round((oldT-newT)*100)/100;
  const omr=i.bal>0?(i.mip*12)/i.bal:0;
  const rr=(i.rate+omr)-(i.nr+mr),pr=(i.pi+i.mip)-(npi+nm);
  const seas=fhaSeason(i.ocDate,i.fpDate,i.tcDate);
  const eRef=estEscrowRefund(i.eBal,i.eMo||esc,i.stDate,i.tcDate);
  const skip=calcSkipped(i.tcDate,i.pi+i.mip+(i.eMo||esc));
  const be=sav>0?Math.round(Math.max(fo,0)/sav*10)/10:null;
  return{payoff,po,ref,u,tl,bl,mr,nm,npd,tl2,sA,tA,sB,tB,sC,tC,tD,sE,tE,sF,tF,sG,tG,tI2,tJ,fo,pricing,lc,ctc,npi,newT,oldT,sav,annual:Math.round(sav*12*100)/100,rr,pr,rPass:rr>=.005,pPass:pr>=50,ntbPass:rr>=.005||pr>=50,seas,eRef,skip,be,mT,mI,esc,nr:i.nr,term:i.term};
}

function runVA(i){
  const po=i.useSt?estPayoff(i.stBal||i.bal,i.rate,i.stDate,i.tcDate):{payoff:i.bal+pd(i.bal,i.rate)*i.dtc,days:i.dtc,pd:pd(i.bal,i.rate)};
  const payoff=Math.round(po.payoff*100)/100;
  const ffR=i.disEx?0:.005;
  const mT=Math.round(i.tax/12*100)/100,mI=Math.round(i.ins/12*100)/100,esc=Math.round((mT+mI)*100)/100;
  const gI=Math.round(mI*i.eIM),gT=Math.round(mT*i.eTM);
  const fT=Math.round(mT*i.pTM),fI=Math.round(mI*i.iPM);
  const tl2=tLookup(payoff);
  const pricing=calcPricing(i.obP,i.pe,payoff);
  const discPts=(!pricing.isCredit&&pricing.diffDollars>0)?Math.round(pricing.diffDollars):0;
  const costsExFF=998+discPts+277+5+65+tl2.t+375;
  const va=va8923(payoff,costsExFF,i.pts||0,ffR);
  const totalLoan=va.maxLoan;
  const ffAmt=Math.round(totalLoan*ffR*100)/100;
  const npd=pd(totalLoan,i.nr);
  const sA={"Processing Fees":499,"Underwriting Fees":499};
  if(discPts>0)sA["Discount Points ("+Math.abs(pricing.diffPct).toFixed(3)+"%)"]=discPts;
  const tA=Object.values(sA).reduce((a,b)=>a+b,0);
  const sB={"Credit Report":277,"Flood Certification":5,"Tax Service":65};
  if(ffAmt>0)sB["VA Funding Fee"]=ffAmt;
  const tB=Object.values(sB).reduce((a,b)=>a+b,0);
  const sC={"Title — Lender's Policy":tl2.l,"Title — Settlement/Escrow":tl2.s},tC=tl2.t;
  const tD=tA+tB+tC;
  const sE={"Recording Fees (incl CA SB2)":375},tE=375;
  const sF={};if(npd>0)sF["Prepaid Interest ("+fmtC(npd)+"/day x 1 day)"]=Math.round(npd);
  if(fT>0)sF["Prepaid Property Tax ("+fmtC(mT)+"/mo x "+i.pTM+" mo)"]=fT;
  if(fI>0)sF["Prepaid Insurance ("+fmtC(mI)+"/mo x "+i.iPM+" mo)"]=fI;
  const tF=Object.values(sF).reduce((a,b)=>a+b,0);
  const sG={};if(gI>0)sG["Insurance Reserve ("+fmtC(mI)+"/mo x "+i.eIM+" mo)"]=gI;
  if(gT>0)sG["Tax Reserve ("+fmtC(mT)+"/mo x "+i.eTM+" mo)"]=gT;
  const tG=Object.values(sG).reduce((a,b)=>a+b,0),tI2=tE+tF+tG;
  const lc=pricing.isCredit?Math.round(pricing.diffDollars):0;
  const tJ=tD+tI2-lc,refiC=costsExFF+ffAmt-lc;
  const ctc=totalLoan-tJ-payoff;
  const npi=mp(totalLoan,i.nr,i.term);
  const newT=Math.round((npi+esc)*100)/100,oldT=Math.round((i.pi+esc)*100)/100;
  const sav=Math.round((oldT-newT)*100)/100;
  const rr=i.rate-i.nr;
  const recM=sav>0?Math.round(Math.max(refiC,0)/sav*10)/10:null;
  const seas=vaSeason(i.fpDate,i.tcDate,i.pmts||0);
  const eRef=estEscrowRefund(i.eBal,i.eMo||esc,i.stDate,i.tcDate);
  const skip=calcSkipped(i.tcDate,i.pi+(i.eMo||esc));
  return{payoff,po,va,totalLoan,ffR,ffAmt,disEx:i.disEx,tl2,sA,tA,sB,tB,sC,tC,tD,sE,tE,sF,tF,sG,tG,tI2,tJ,refiC,pricing,lc,ctc,npi,newT,oldT,sav,annual:Math.round(sav*12*100)/100,rr,ntbPass:rr>=.005,recM,recPass:recM!==null&&recM<=36,seas,eRef,skip,be:recM,mT,mI,esc,nr:i.nr,term:i.term};
}

function generatePDF(r,tab,borrower,property,lo){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();let y=20;const LM=15,RV=145;
  const hdr=(t)=>{doc.setFontSize(9);doc.setTextColor(80,250,123);doc.text(t,LM,y);y+=6;doc.setDrawColor(30,41,59);doc.line(LM,y-2,195,y-2);};
  const row=(l,v,bold)=>{doc.setFontSize(8);doc.setTextColor(bold?226:139,bold?232:141,bold?240:165);doc.text(l,LM+2,y);doc.text(String(v),RV,y,{align:"right"});y+=5;};
  const divider=()=>{doc.setDrawColor(30,41,59);doc.line(LM,y,195,y);y+=4;};
  const np=()=>{if(y>260){doc.addPage();y=20;}};
  doc.setFillColor(10,14,23);doc.rect(0,0,210,297,"F");
  doc.setFontSize(12);doc.setTextColor(80,250,123);doc.text("TEAM LAMM — PROCESSING WORKSHEET",LM,y);y+=6;
  doc.setFontSize(7);doc.setTextColor(98,114,164);doc.text("MortgageOne Inc. NMLS #209221 · Internal Use Only · "+new Date().toLocaleDateString(),LM,y);y+=10;
  hdr("LOAN INFORMATION");
  row("Borrower",borrower||"TBD");row("Property",property||"TBD");
  row("Loan Officer",lo||"Team Lamm");row("Loan Type",tab==="fha"?"FHA Streamline":"VA IRRRL");
  row("Date Prepared",new Date().toLocaleDateString());y+=4;
  hdr("PAYOFF (20-DAY BUFFER)");
  row("Estimated Payoff",fmt(r.payoff));row("Per Diem Interest",fmtC(r.po?.pd||0)+"/day");
  row("Payoff Days (incl 20-day buffer)",(r.po?.days||0)+" days");y+=4;
  if(tab==="fha"&&r.u){hdr("UFMIP");row("Months Since Case",String(r.ref?.ms||0));row("Refund Rate",r.ref?.pDisp||"0%");
  row("Refund Amount",fmt(r.ref?.amt||0));row("Gross UFMIP (1.75%)",fmt(r.u.g));row("Net UFMIP Financed",fmt(r.u.n));row("Total Loan Amount",fmt(r.tl),true);y+=4;}
  if(tab==="va"&&r.va){hdr("VA FORM 26-8923");row("Existing Balance",fmt(r.va.bal));row("Closing Costs (excl FF)",fmt(r.va.costs));
  row("Preliminary Loan",fmt(r.va.prelim));row("Revised FF",fmt(r.va.revFF));row("Max Loan Amount",fmt(r.va.maxLoan),true);
  row("Funding Fee ("+(r.disEx?"EXEMPT":"0.50%")+")",fmt(r.ffAmt));y+=4;}
  np();hdr("CLOSING COSTS — LE SECTIONS A-J");
  const sp=(label,items,total)=>{doc.setFontSize(7);doc.setTextColor(139,233,253);doc.text(label,LM+2,y);doc.text(fmt(total),RV,y,{align:"right"});y+=5;Object.entries(items).forEach(([k,v])=>row("  "+k,fmt(v)));};
  sp("A. ORIGINATION CHARGES",r.sA,r.tA);sp("B. SERVICES CANNOT SHOP FOR",r.sB,r.tB);sp("C. SERVICES CAN SHOP FOR",r.sC,r.tC);
  divider();row("D. TOTAL LOAN COSTS (A+B+C)",fmt(r.tD),true);y+=2;np();
  sp("E. GOVERNMENT FEES",r.sE,r.tE);
  if(Object.keys(r.sF).length)sp("F. PREPAIDS",r.sF,r.tF);
  if(Object.keys(r.sG).length)sp("G. INITIAL ESCROW",r.sG,r.tG);
  divider();row("I. TOTAL OTHER COSTS (E+F+G)",fmt(r.tI2));
  if(r.lc>0)row("Credit to Borrower","-"+fmt(r.lc));
  row("J. TOTAL CLOSING COSTS",fmt(r.tJ),true);y+=4;
  np();hdr("PRICING");row("OB Price",r.pricing.obPrice.toFixed(3));
  row("Price Exception",(r.pricing.priceException>=0?"+":"")+r.pricing.priceException.toFixed(3));
  row("Adjusted Price",r.pricing.adjusted.toFixed(3));
  row(r.pricing.isCredit?"Credit to Borrower":"Discount Points",fmt(r.pricing.diffDollars));y+=4;
  hdr("CASH TO CLOSE");row("Loan Amount",fmt(tab==="fha"?r.tl:r.totalLoan));
  row("- Total Closing Costs (J)",fmt(-r.tJ));row("- Estimated Payoff",fmt(-r.payoff));divider();
  row("Cash to Close ("+(r.ctc<=0?"From Borrower":"To Borrower")+")",fmt(Math.abs(r.ctc)),true);y+=4;
  np();hdr("NEW PAYMENT");row("New Rate",fmtP(r.nr));row("Term",(r.term/12)+" years");
  row("P&I",fmt(r.npi));if(tab==="fha")row("Monthly MIP",fmt(r.nm||0));
  row("Escrow",fmt(r.esc));row("New Total Payment",fmt(r.newT),true);row("Current Total Payment",fmt(r.oldT));
  divider();row("Monthly Savings",fmt(r.sav),true);row("Annual Savings",fmt(r.annual),true);
  if(r.be)row("Break-Even",r.be+" months");y+=4;
  hdr("COMPLIANCE");
  if(tab==="fha"){row("NTB Rate Reduction",fmtP(r.rr)+" (need >= 0.500%)");row("NTB Payment Reduction",fmt(r.pr)+" (need >= $50)");row("NTB Result",r.ntbPass?"PASS":"FAIL");
  if(r.seas)row("Seasoning (210d from closing)",r.seas.pass?"PASS "+r.seas.days+"d":"NOT YET "+r.seas.earliest);}
  else{row("Rate Reduction",fmtP(r.rr)+" (need >= 0.500%)");row("NTB Result",r.ntbPass?"PASS":"FAIL");
  row("Recoupment",(r.recM||"N/A")+" months (max 36)");row("Recoupment",r.recPass?"PASS":"FAIL");
  if(r.seas)row("Seasoning (210d from 1st pmt due)",r.seas.pass?"PASS "+r.seas.days+"d":"NOT YET "+r.seas.earliest);}
  y+=8;doc.setFontSize(6);doc.setTextColor(74,85,104);
  doc.text("Subject to final underwriting approval. Rates and fees subject to change.",LM,y);y+=4;
  doc.text("Team Lamm · MortgageOne Inc. NMLS #209221 · "+new Date().toLocaleString(),LM,y);
  doc.save("Processing_"+(borrower||"Borrower").replace(/\s/g,"_")+"_"+new Date().toISOString().split("T")[0]+".pdf");
}

function generateEmail(r,tab,borrower,property){
  const first=(borrower||"").split(" ")[0]||"there";
  const lt=tab==="fha"?"FHA":"VA";
  const L=[];
  L.push("Subject: Your "+lt+" Refinance — "+(property||"Your Property"));L.push("");
  L.push("Hi "+first+",");L.push("");
  L.push("I've run the numbers on refinancing your "+lt+" loan and wanted to share what I'm seeing.");L.push("");
  L.push("YOUR NEW LOAN");
  L.push("  New Rate: "+fmtP(r.nr));
  L.push("  New Payment: "+fmt(r.newT)+"/mo (P&I"+(tab==="fha"?" + MIP":"")+" + escrow)");
  L.push("  Current Payment: "+fmt(r.oldT)+"/mo");
  L.push("  Monthly Savings: "+fmt(r.sav));
  L.push("  Annual Savings: "+fmt(r.annual));
  L.push("  Estimated Cash to Close: "+fmt(Math.abs(r.ctc))+" "+(r.ctc<=0?"(from you)":"(to you)"));
  if(r.be)L.push("  Break-Even: ~"+r.be+" months");L.push("");
  if(r.skip&&r.skip.cnt>0||r.eRef){L.push("CASH BACK TO YOU");
  if(r.skip&&r.skip.cnt>0)L.push("During the refinance process, you'll skip your "+r.skip.months.join(" and ")+" payment"+(r.skip.cnt>1?"s":"")+". That's "+fmt(r.skip.saved)+" you keep in your pocket. Your first new payment won't be due until "+r.skip.firstNew+".");
  if(r.eRef)L.push("Your current lender will also refund your escrow balance — I estimate roughly "+fmt(r.eRef.refund)+". This typically arrives 20 to 30 days after closing.");L.push("");}
  L.push("A FEW THINGS TO KEEP IN MIND");

        <div style={S.sr}><span style={S.sl}>Adjusted Price</span><span style={S.sa()}>{r.pricing.adjusted.toFixed(3)}</span></div>
        <div style={S.div}/>
        <div style={S.sr}><span style={{color:r.pricing.isCredit?"#50fa7b":"#ff5555",fontWeight:700}}>{r.pricing.isCredit?"Credit to Borrower":"Discount Points"}</span><span style={{color:r.pricing.isCredit?"#50fa7b":"#ff5555",fontWeight:700,fontSize:"14px"}}>{fmt(r.pricing.diffDollars)}</span></div>
        {r.pricing.isCredit&&<div style={{fontSize:"10px",color:"#50fa7b",marginTop:"4px"}}>↑ Applied as credit reducing closing costs in Section J and cash to close</div>}
        {!r.pricing.isCredit&&r.pricing.diffDollars>0&&<div style={{fontSize:"10px",color:"#ff5555",marginTop:"4px"}}>↑ Added as cost in Section A: Origination Charges</div>}
      </div>

      <div style={S.card}><div style={S.ct}>Cash to Close</div>
        <div style={S.sr}><span style={S.sl}>Loan Amount</span><span style={S.sa()}>{fmt(tab==="fha"?r.tl:r.totalLoan)}</span></div>
        <div style={S.sr}><span style={S.sl}>− Closing Costs (J, net of credits)</span><span style={S.sa("#ff5555")}>{fmt(-r.tJ)}</span></div>
        <div style={S.sr}><span style={S.sl}>− Estimated Payoff</span><span style={S.sa("#ff5555")}>{fmt(-r.payoff)}</span></div>
        <div style={S.div}/>
        <div style={S.sr}><span style={{fontWeight:700,color:"#f8f8f2"}}>Cash to Close ({r.ctc<=0?"From Borrower":"To Borrower"})</span><span style={{color:r.ctc>0?"#50fa7b":"#ff79c6",fontWeight:700,fontSize:"16px"}}>{fmt(Math.abs(r.ctc))}</span></div>
      </div>

      {(r.skip?.cnt>0||r.eRef)&&<div style={S.card}><div style={S.ct}>💰 Cash Back to Borrower</div>
        {r.skip?.cnt>0&&<div style={{marginBottom:"10px"}}>
          <div style={S.sr}><span style={S.sl}>Skipped: {r.skip.months.join(", ")}</span><span style={S.sa("#50fa7b")}>{fmt(r.skip.saved)}</span></div>
          <div style={{fontSize:"10px",color:"#6272a4"}}>First new payment: {r.skip.firstNew}</div>
        </div>}
        {r.eRef&&<div style={{marginBottom:"10px"}}>
          <div style={S.sr}><span style={S.sl}>Est. Escrow Refund (20-30 days post-close)</span><span style={S.sa("#50fa7b")}>{fmt(r.eRef.refund)}</span></div>
          <div style={{fontSize:"10px",color:"#6272a4"}}>Current balance: {fmt(r.eRef.bal)} + {r.eRef.mos} mo deposits</div>
        </div>}
        <div style={S.div}/>
        <div style={S.sr}><span style={{color:"#50fa7b",fontWeight:700}}>Total Est. Cash Back</span><span style={{color:"#50fa7b",fontWeight:700,fontSize:"16px"}}>{fmt((r.skip?.saved||0)+(r.eRef?.refund||0))}</span></div>
      </div>}

      <div style={S.card}><div style={S.ct}>Payment Comparison</div>
        <div style={S.g(2)}>
          <div>
            <div style={{fontSize:"10px",color:"#6272a4",marginBottom:"4px"}}>CURRENT</div>
            <div style={S.sr}><span style={S.sl}>P&I</span><span style={S.sa()}>{fmt(parseFloat(pi))}</span></div>
            {tab==="fha"&&<div style={S.sr}><span style={S.sl}>MIP</span><span style={S.sa()}>{fmt(parseFloat(mip))}</span></div>}
            <div style={S.sr}><span style={S.sl}>Escrow</span><span style={S.sa()}>{fmt(r.esc)}</span></div>
            <div style={{...S.sr,borderTop:"1px solid #2a3040",paddingTop:"4px"}}><span style={{fontWeight:700,color:"#e2e8f0"}}>Total</span><span style={{fontWeight:700,color:"#e2e8f0"}}>{fmt(r.oldT)}</span></div>
          </div>
          <div>
            <div style={{fontSize:"10px",color:"#50fa7b",marginBottom:"4px"}}>NEW</div>
            <div style={S.sr}><span style={S.sl}>P&I</span><span style={S.sa("#50fa7b")}>{fmt(r.npi)}</span></div>
            {tab==="fha"&&<div style={S.sr}><span style={S.sl}>MIP</span><span style={S.sa("#50fa7b")}>{fmt(r.nm||0)}</span></div>}
            <div style={S.sr}><span style={S.sl}>Escrow</span><span style={S.sa("#50fa7b")}>{fmt(r.esc)}</span></div>
            <div style={{...S.sr,borderTop:"1px solid #2a3040",paddingTop:"4px"}}><span style={{fontWeight:700,color:"#50fa7b"}}>Total</span><span style={{fontWeight:700,color:"#50fa7b"}}>{fmt(r.newT)}</span></div>
          </div>
        </div>
        <div style={{...S.m("#50fa7b"),marginTop:"10px"}}><div style={S.mv("#50fa7b")}>{fmt(r.sav)}/mo · {fmt(r.annual)}/yr</div><div style={S.ml}>Monthly & Annual Savings</div></div>
      </div>

      <div style={S.card}><div style={S.ct}>Compliance</div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
          <span style={S.badge(r.ntbPass)}>{r.ntbPass?"✓ NTB PASS":"✗ NTB FAIL"}</span>
          <span style={{fontSize:"11px",color:"#8b95a5"}}>{tab==="fha"?"Rate: "+fmtP(r.rr)+" (≥0.500%) · Payment: "+fmt(r.pr)+" (≥$50)":"Rate: "+fmtP(r.rr)+" (≥0.500%)"}</span>
        </div>
        {r.seas&&<div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
          <span style={S.badge(r.seas.pass)}>{r.seas.pass?"✓ SEASONING":"✗ SEASONING"}</span>
          <span style={{fontSize:"11px",color:"#8b95a5"}}>{r.seas.pass?"Eligible":"Earliest: "+r.seas.earliest} — {tab==="fha"?"210 days from closing":"210 days from 1st pmt due (PL 116-33)"}</span>
        </div>}
        {tab==="va"&&<div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
          <span style={S.badge(r.recPass)}>{r.recPass?"✓ RECOUP":"✗ RECOUP"}</span>
          <span style={{fontSize:"11px",color:"#8b95a5"}}>{r.recM?r.recM+" months (max 36)":"No savings"}</span>
        </div>}
      </div>

      {showEmail&&<div style={S.card}><div style={S.ct}>Client Email</div>
        <div style={{display:"flex",gap:"10px",marginBottom:"12px"}}>
          <button style={S.btn2("#50fa7b")} onClick={copyEmail}>{copied?"✓ Copied!":"Copy to Clipboard"}</button>
          <button style={S.btn2("#8be9fd")} onClick={()=>{window.open("mailto:?subject="+encodeURIComponent(email.split("\n")[0].replace("Subject: ",""))+"&body="+encodeURIComponent(email.split("\n").slice(2).join("\n")))}}>Open in Mail</button>
        </div>
        <textarea value={email} onChange={e=>setEmail(e.target.value)} style={{width:"100%",height:"400px",background:"#0d1117",border:"1px solid #2a3040",color:"#e2e8f0",fontSize:"12px",fontFamily:"inherit",padding:"12px",resize:"vertical"}}/>
      </div>}

      <div style={{...S.card,opacity:.6}}><div style={S.ct}>Fee Schedule</div>
        <div style={{fontSize:"11px",color:"#6272a4",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"4px"}}>
          <span>Processing: $499</span><span>Underwriting: $499</span><span>Credit Report: $277</span>
          <span>Flood: $5</span><span>Tax Svc: $65</span><span>Recording: $375</span>
          <span>Appraisal: $750 (not streamline)</span><span>Title: Dynamic by loan amt</span>
        </div>
      </div>
      <div style={{textAlign:"center",fontSize:"10px",color:"#4a5568",padding:"20px 0"}}>
        Subject to final underwriting approval. Rates and fees subject to change.<br/>Team Lamm · MortgageOne Inc. NMLS #209221
      </div>
    </div>}
  </div>;
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
